version: '3.8'

services:
  ai-backends:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-backends-server
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Map the workspace directory to allow the AI to read/write code
      - /home/timothy/Projects:/workspace
      
      # Optional: Mount Docker socket to allow AI control over other containers
      - /var/run/docker.sock:/var/run/docker.sock
      
      # Optional: Mount Host DBus System Bus for systemd service management
      # - /var/run/dbus/system_bus_socket:/var/run/dbus/system_bus_socket
      
    environment:
      - WORKSPACE_DIR=/workspace
      # Specify host DBus system bus address if mounted
      # - DBUS_SYSTEM_BUS_ADDRESS=unix:path=/var/run/dbus/system_bus_socket
    
    # PID sharing can be enabled to allow monitoring of host processes
    # pid: "host"
