# Nginx load balancer configuration for Arch Systems Portal
# Supports multiple portal instances with health checks and SSL termination

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                   '$status $body_bytes_sent "$http_referer" '
                   '"$http_user_agent" "$http_x_forwarded_for" '
                   'rt=$request_time uct="$upstream_connect_time" '
                   'uht="$upstream_header_time" urt="$upstream_response_time"';
    
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml;

    # Upstream - portal (Next.js frontend) and api (NestJS backend)
    upstream portal_backend {
        server portal:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream api_backend {
        server api:3001 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # HTTP - redirect to HTTPS
    server {
        listen 80;
        server_name _;
        
        # Health check endpoint (no redirect for internal monitoring)
        location /healthz {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
        
        # Redirect all HTTP to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl http2;
        server_name _;

        # SSL configuration
        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Proxy settings
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Health check endpoint — routed to NestJS API
        location /healthz {
            access_log off;
            proxy_pass http://api_backend/api/health/live;
        }

        # ── Migrated API routes → NestJS API ──
        location /api/health {
            proxy_pass http://api_backend;
            proxy_buffering off;
        }

        location /api/auth/ {
            proxy_pass http://api_backend;
            proxy_buffering off;
        }

        location /api/weather {
            proxy_pass http://api_backend;
            proxy_buffering off;
        }

        location /api/csp-violations {
            proxy_pass http://api_backend;
            proxy_buffering off;
        }

        location /api/metrics {
            proxy_pass http://api_backend;
            proxy_buffering off;
        }

        location /api/tools/ {
            proxy_pass http://api_backend;
            proxy_buffering off;
        }

        location /api/admin/ {
            proxy_pass http://api_backend;
            proxy_buffering off;
        }

        location /api/webhooks {
            proxy_pass http://api_backend;
            proxy_buffering off;
        }

        location /api/control-room/ {
            proxy_pass http://api_backend;
            proxy_buffering off;
        }

        location /api/c66 {
            proxy_pass http://api_backend;
            proxy_buffering off;
        }

        location /api/export/ {
            proxy_pass http://api_backend;
            proxy_buffering off;
        }

        location /api/telemetry/ {
            proxy_pass http://api_backend;
            proxy_buffering off;
        }

        location /api/sync/ {
            proxy_pass http://api_backend;
            proxy_buffering off;
        }

        location /api/plugins/rust-telemetry {
            proxy_pass http://api_backend;
            proxy_buffering off;
        }

        location /api/ai/ {
            proxy_pass http://api_backend;
            proxy_buffering off;
        }

        location /api/inngest {
            proxy_pass http://api_backend;
            proxy_buffering off;
        }

        # Remaining API routes → portal (until fully migrated)
        location /api/ {
            proxy_pass http://portal_backend;
            proxy_buffering off;
        }

        # WebSocket support for real-time features
        location /_next/webpack-hmr {
            proxy_pass http://portal_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Static assets with caching
        location /_next/static/ {
            proxy_pass http://portal_backend;
            proxy_cache_valid 200 1y;
            add_header Cache-Control "public, immutable";
        }

        # All other requests to portal
        location / {
            proxy_pass http://portal_backend;
        }
    }
}