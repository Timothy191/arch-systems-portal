# Default skill catalogs for AI Stack Kit (`aistack search`, typed adds, etc.).
# Copied to project root as `sources.config.yaml` on `aistack init` when that file is missing.
#
# GitHub: set `GITHUB_TOKEN` for higher rate limits. Listing uses the GitHub API; enrichment uses
# raw.githubusercontent.com (bounded — see githubMetadataEnrichMax).
#
# Skill markdown / SKILL.md packs from these repos are largely interchangeable across clients:
# Cursor, Copilot, and Claude adapters normalize similar payloads — pick `client.type` in spec.yaml
# for where files are written.
#
# Browse-only (curated README, not a GitHub skill tree — use for discovery, not this file):
#   https://github.com/VoltAgent/awesome-agent-skills

version: 1
cacheTtlSeconds: 3600
cacheDir: .cache/aistack
githubMetadataEnrichMax: 120
githubMetadataEnrichConcurrency: 8

sources:
  # Copilot community skills — https://github.com/github/awesome-copilot/tree/main/skills
  - type: github
    id: awesome-copilot
    repo: github/awesome-copilot
    path: skills
    branch: main

  # Copilot community hooks — https://github.com/github/awesome-copilot/tree/main/hooks (hook.json / hook.md layout)
  - type: github
    id: awesome-copilot-hooks
    repo: github/awesome-copilot
    path: hooks
    branch: main
    moduleType: hook

  # Copilot community subagents — https://github.com/github/awesome-copilot/tree/main/agents (flat *.agent.md files)
  - type: github
    id: awesome-copilot-agents
    repo: github/awesome-copilot
    path: agents
    branch: main
    moduleType: subagent

  # Official Anthropic reference skills — https://github.com/anthropics/skills/tree/main/skills
  - type: github
    id: anthropic-skills
    repo: anthropics/skills
    path: skills
    branch: main

  # Composio curated Claude-oriented packs (folders at repo root) — https://github.com/ComposioHQ/awesome-claude-skills
  - type: github
    id: composio-awesome-claude-skills
    repo: ComposioHQ/awesome-claude-skills
    path: ""
    branch: master

  # Microsoft GitHub skills — https://github.com/microsoft/skills/tree/main/.github/skills
  - type: github
    id: microsoft-skills
    repo: microsoft/skills
    path: .github/skills
    branch: main

  # Microsoft Azure agent skills — https://github.com/microsoft/azure-skills/tree/main/skills
  - type: github
    id: microsoft-azure-skills
    repo: microsoft/azure-skills
    path: skills
    branch: main

  # OpenAI curated skills — https://github.com/openai/skills/tree/main/skills/.curated
  - type: github
    id: openai-skills
    repo: openai/skills
    path: skills/.curated
    branch: main

  # Google Cloud skills subtree — https://github.com/google/skills/tree/main/skills/cloud
  - type: github
    id: google-skills-cloud
    repo: google/skills
    path: skills/cloud
    branch: main
