# ══════════════════════════════════════════════════════════════════════════════
# Arch-Systems — Production Docker Compose Configuration
#
# For production deployments with resource limits, SSL, and production settings.
# Do not use this for local development.
#
# Usage:
#   docker compose -f docker-compose.production.yml up -d
#   docker compose -f docker-compose.production.yml down
#
# ══════════════════════════════════════════════════════════════════════════════

name: arch-systems-production

# ── Production Infrastructure ────────────────────────────────────────────────
# Production-optimized configuration with resource limits and health monitoring
# All secrets must be provided via environment variables or secret files.

services:

  # ── Frontend (Next.js Portal) ────────────────────────────────────────────────
  portal:
    build:
      context: .
      dockerfile: apps/portal/Dockerfile
      target: runner
      args:
        NODE_ENV: production
    container_name: arch-portal-prod
    restart: always
    ports:
      - "3000:3000"
    environment:
      # Supabase configuration (must be set via environment)
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      # Database and cache (must be set via environment)
      REDIS_URL: ${REDIS_URL}
      DATABASE_URL: ${DATABASE_URL}
      # Production settings
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
      # Monitoring
      SENTRY_DSN: ${SENTRY_DSN:-}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    # depends_on:
    #   In production, Redis and Postgres are typically managed services
    #   These dependencies are commented out but can be enabled if needed
    #   redis:
    #     condition: service_healthy
    #   postgres:
    #     condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - arch-net-prod

  # ── Redis (Optional - Use Managed Redis in Production) ───────────────────────
  # Uncomment if deploying self-hosted Redis in production
  # redis:
  #   image: redis:7-alpine
  #   container_name: arch-redis-prod
  #   restart: always
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data_prod:/data
  #   command: redis-server --save 60 1 --loglevel warning --requirepass ${REDIS_PASSWORD}
  #   environment:
  #     REDIS_PASSWORD: ${REDIS_PASSWORD}
  #   deploy:
  #     resources:
  #       limits:
  #         cpus: '0.5'
  #         memory: 512M
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   networks:
  #     - arch-net-prod

  # ── Postgres (Optional - Use Managed PostgreSQL in Production) ───────────────
  # Uncomment if deploying self-hosted PostgreSQL in production
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: arch-postgres-prod
  #   restart: always
  #   ports:
  #     - "5432:5432"
  #   environment:
  #     POSTGRES_USER: ${POSTGRES_USER}
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  #     POSTGRES_DB: ${POSTGRES_DB}
  #   volumes:
  #     - postgres_data_prod:/var/lib/postgresql/data
  #   deploy:
  #     resources:
  #       limits:
  #         cpus: '1.0'
  #         memory: 2G
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   networks:
  #     - arch-net-prod

# ── Volumes (Only needed if using self-hosted Redis/PostgreSQL) ──────────────
# volumes:
#   redis_data_prod:
#   postgres_data_prod:

# ── Networks ────────────────────────────────────────────────────────────────
networks:
  arch-net-prod:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-arch-prod