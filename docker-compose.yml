name: arch-systems-dev

# ── Local development infrastructure ─────────────────────────────────────────
# Provides: Full stack (Frontend + Postgres + Redis) for local development
# Start with:  docker compose up -d
# Stop with:   docker compose down
# Wipe data:   docker compose down -v

services:

  # ── Frontend (Next.js Portal) ────────────────────────────────────────────────
  portal:
    build:
      context: .
      dockerfile: apps/portal/Dockerfile
      target: runner
    container_name: arch-portal
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Supabase configuration
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      # Database and cache
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/arch_dev
      # Application settings
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: 1
    volumes:
      # Hot reload for development
      - ./apps/portal/src:/app/apps/portal/src
      - ./apps/portal/public:/app/apps/portal/public
      - ./packages:/app/packages
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - arch-net

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: arch-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arch-net

  # ── Postgres ─────────────────────────────────────────────────────────────────
  # Standalone Postgres for local development when Supabase CLI is not in use.
  # If you run `pnpm supabase start` this service is not needed — comment it out.
  postgres:
    image: postgres:16-alpine
    container_name: arch-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: arch_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arch-net

volumes:
  redis_data:
  postgres_data:

networks:
  arch-net:
    driver: bridge
