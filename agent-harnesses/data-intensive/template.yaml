---
# Data Intensive Harness Template
apiVersion: v1
kind: Harness
metadata:
  name: data-intensive-harness
  version: 1.0.0
spec:
  type: data-processing
  features:
    - batch-processing
    - caching
    - performance-monitoring
  configuration:
    batchSize: 1000
    cacheExpiry: 3600
    maxConnections: 10
  input:
    sources:
      - type: database
        connection: "{{DATABASE_CONNECTION}}"
      - type: file
        path: "{{DATA_PATH}}"
  processing:
    steps:
      - name: validate
        type: validation
      - name: transform
        type: transformation
      - name: aggregate
        type: aggregation
  output:
    destination: "{{OUTPUT_DESTINATION}}"
    format: parquet
  monitoring:
    enabled: true
    metricsInterval: 60
