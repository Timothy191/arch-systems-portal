<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>memex Codebase Knowledge Graph</title>
    <link rel="stylesheet" href="graph.css">
    <script src="https://cdn.jsdelivr.net/npm/d3@7.8.5/dist/d3.min.js"></script>
</head>
<body>
    <div id="app-container">
        <div id="toolbar">
            <button id="btn-refresh" title="Force Refresh">Refresh</button>
            <button id="btn-reset-zoom" title="Reset Zoom">Reset View</button>
            <span id="connection-status">Initializing...</span>
        </div>

        <div id="workspace">
            <div id="canvas-container">
                <svg id="graph-svg"></svg>
            </div>

            <div id="detail-panel" class="hidden">
                <div class="panel-header">
                    <h3 id="detail-title">Node Details</h3>
                    <button id="panel-close-btn">&times;</button>
                </div>
                <div class="panel-body">
                    <p><strong>Type:</strong> <span id="detail-type">-</span></p>
                    <p id="detail-status-container" class="hidden"><strong>Status:</strong> <span id="detail-status">-</span></p>
                    <p id="detail-scope-container" class="hidden"><strong>Scope:</strong> <span id="detail-scope">-</span></p>
                    <p id="detail-commit-container" class="hidden"><strong>Commit:</strong> <span id="detail-commit">-</span></p>
                    <p><strong>Created:</strong> <span id="detail-created">-</span></p>
                    <div id="detail-summary-container">
                        <strong>Summary:</strong>
                        <div id="detail-summary" class="summary-box"></div>
                    </div>
                    <div id="action-tip" class="action-tip">Double-click file nodes to open in editor.</div>
                </div>
            </div>
        </div>
    </div>
    <script src="graph.js"></script>
</body>
</html>
