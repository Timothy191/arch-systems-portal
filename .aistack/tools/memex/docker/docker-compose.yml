services:
  neo4j:
    image: neo4j:5.26.0-community
    container_name: memex-neo4j
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    environment:
      # Hardcode auth to match .env precisely and avoid interpolation issues
      - NEO4J_AUTH=neo4j/memex-local
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

volumes:
  neo4j_data:
  neo4j_logs:
