name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Quality Gate
    uses: ./.github/workflows/quality-gate.yml
    secrets: inherit

  deploy-staging:
    name: Deploy to Staging
    needs: quality-gate
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: staging
      url: https://staging.arch-mk2.example.com
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "9.15.9"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile

      - name: Build API
        working-directory: apps/api
        run: npx nest build
      - name: Build Portal
        working-directory: apps/portal
        run: npx next build

      - name: Deploy API via Docker Compose
        env:
          DOCKER_HOST: ${{ secrets.STAGING_DOCKER_HOST }}
        run: |
          echo "Deploying to staging environment..."
          # docker compose -f docker-compose.portal.yml -f docker-compose.tools.yml up -d --build

      - name: Health Check
        run: |
          echo "Running health checks..."
          # curl -f https://staging.arch-mk2.example.com/api/health || exit 1
          echo "Staging deployment complete."

  deploy-production:
    name: Deploy to Production
    needs: quality-gate
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'production'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
      url: https://arch-mk2.example.com
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "9.15.9"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile

      - name: Build API
        working-directory: apps/api
        run: npx nest build
      - name: Build Portal
        working-directory: apps/portal
        run: npx next build

      - name: Deploy to Production
        env:
          DOCKER_HOST: ${{ secrets.PRODUCTION_DOCKER_HOST }}
        run: |
          echo "Deploying to production environment..."
          # docker compose -f docker-compose.production.yml up -d --build

      - name: Health Check
        run: |
          echo "Running production health checks..."
          # curl -f https://arch-mk2.example.com/api/health || exit 1
          echo "Production deployment complete."
