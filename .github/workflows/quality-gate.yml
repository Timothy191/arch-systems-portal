name: Arch-Mk2 Quality Gate

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "9.15.9"
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "9.15.9"
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm type-check

  test-api:
    name: Test API
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "9.15.9"
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Run API tests
        working-directory: apps/api
        run: npx jest --no-cache --forceExit --verbose --coverage 2>&1 | tail -20

  test-packages:
    name: Test Shared Packages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "9.15.9"
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Test @repo/supabase
        working-directory: packages/supabase
        run: npx jest --no-cache --verbose --coverage 2>&1 | tail -10
      - name: Test @repo/redis
        working-directory: packages/redis
        run: ./node_modules/.bin/jest --no-cache --verbose --coverage 2>&1 | tail -10
      - name: Test @repo/rate-limiter
        working-directory: packages/rate-limiter
        run: ./node_modules/.bin/jest --no-cache --verbose --coverage 2>&1 | tail -10

  rls-audit:
    name: RLS Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "9.15.9"
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Run RLS Audit
        run: pnpm audit:rls

  test-portal:
    name: Test Portal
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "9.15.9"
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Run Portal tests
        working-directory: apps/portal
        run: npx jest --passWithNoTests --forceExit --verbose --coverage 2>&1 | tail -20

  build:
    name: Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "9.15.9"
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Build Portal
        run: pnpm --filter portal build 2>&1 | tail -20
