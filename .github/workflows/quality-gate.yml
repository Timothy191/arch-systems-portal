name: Arch-Mk2 Quality Gate

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare Environment
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      node-version: "22"
      pnpm-version: "9.15.9"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "9.15.9"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile

  lint:
    name: Lint
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "9.15.9"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  type-check:
    name: Type Check
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "9.15.9"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm type-check

  test-api:
    name: Test API
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "9.15.9"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Run API tests
        working-directory: apps/api
        run: npx jest --no-cache --forceExit --verbose --coverage 2>&1 | tail -20

  test-packages:
    name: Test Shared Packages
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "9.15.9"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Test @repo/supabase
        working-directory: packages/supabase
        run: npx jest --no-cache --verbose --coverage 2>&1 | tail -10
      - name: Test @repo/redis
        working-directory: packages/redis
        run: ./node_modules/.bin/jest --no-cache --verbose --coverage 2>&1 | tail -10
      - name: Test @repo/rate-limiter
        working-directory: packages/rate-limiter
        run: ./node_modules/.bin/jest --no-cache --verbose --coverage 2>&1 | tail -10

  rls-audit:
    name: RLS Audit
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "9.15.9"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Run RLS Audit
        run: pnpm audit:rls

  test-portal:
    name: Test Portal
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "9.15.9"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Run Portal tests
        working-directory: apps/portal
        run: npx jest --no-cache --forceExit --verbose --coverage lib/data/__tests__/ 2>&1 | tail -10

  knip:
    name: Dead Code Detection
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "9.15.9"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm knip

  test-e2e:
    name: E2E Tests
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      # Portal is started inline below; no external services needed for unauthenticated E2E tests
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "9.15.9"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: Start Portal (dev mode)
        run: |
          pnpm --filter portal dev &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000 > /dev/null && echo "Portal ready" && break
            echo "Waiting for portal... ($i)"
            sleep 2
          done
      - name: Run E2E tests (unauthenticated)
        run: npx playwright test --reporter=list 2>&1
      - name: Run Auth E2E tests (CI-safe with fallback)
        continue-on-error: true
        run: npx playwright test e2e/auth-ui.spec.ts --reporter=list 2>&1
      - name: Upload E2E artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: test-results/

  build:
    name: Build Check
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "9.15.9"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Build Portal
        run: pnpm --filter portal build 2>&1 | tail -20
