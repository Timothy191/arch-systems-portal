name: API Build & Test

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/api/**'
      - 'packages/supabase/**'
      - 'packages/redis/**'
      - 'packages/utils/**'
      - 'packages/rate-limiter/**'
      - 'pnpm-lock.yaml'
  pull_request:
    paths:
      - 'apps/api/**'
      - 'packages/supabase/**'
      - 'packages/redis/**'
      - 'packages/utils/**'
      - 'packages/rate-limiter/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "9.15.9"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Type check API
        working-directory: apps/api
        run: npx tsc --noEmit
      - name: Type check shared packages
        run: |
          cd packages/supabase && npx tsc --noEmit
          cd ../redis && npx tsc --noEmit
          cd ../rate-limiter && npx tsc --noEmit

  test:
    name: Tests
    needs: type-check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "9.15.9"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Test API services
        working-directory: apps/api
        run: npx jest --no-cache --forceExit --verbose 2>&1 | tail -20
      - name: Test @repo/supabase
        working-directory: packages/supabase
        run: npx jest --no-cache --verbose 2>&1 | tail -10
      - name: Test @repo/redis
        working-directory: packages/redis
        run: ./node_modules/.bin/jest --no-cache --verbose 2>&1 | tail -10
      - name: Test @repo/rate-limiter
        working-directory: packages/rate-limiter
        run: ./node_modules/.bin/jest --no-cache --verbose 2>&1 | tail -10

  build:
    name: Build API
    needs: type-check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "9.15.9"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Build API
        working-directory: apps/api
        run: npx nest build 2>&1 | tail -10

  docker:
    name: Docker Build
    needs: [test, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          tags: arch-api:${{ github.sha }}
          load: true
      - name: Health check
        run: |
          docker run -d --name api-test -p 3001:3001 arch-api:${{ github.sha }}
          sleep 5
          curl -f http://localhost:3001/api/health || exit 1
          docker stop api-test
